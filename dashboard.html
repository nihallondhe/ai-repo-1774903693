<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Dashboard</h1>
            <div class="user-info">
                <span id="username">User</span>
                <button id="logoutBtn">Logout</button>
            </div>
        </header>
        <aside class="sidebar">
            <nav>
                <ul class="nav-menu">
                    <li><a href="#" class="nav-link active" data-section="overview">Overview</a></li>
                    <li><a href="#" class="nav-link" data-section="analytics">Analytics</a></li>
                    <li><a href="#" class="nav-link" data-section="reports">Reports</a></li>
                    <li><a href="#" class="nav-link" data-section="settings">Settings</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <section id="overview" class="content-section active">
                <h2>Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p class="stat-value" id="totalUsers">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Revenue</h3>
                        <p class="stat-value" id="revenue">$0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Active Sessions</h3>
                        <p class="stat-value" id="activeSessions">0</p>
                    </div>
                </div>
            </section>
            <section id="analytics" class="content-section">
                <h2>Analytics</h2>
                <p>Analytics content will be displayed here.</p>
            </section>
            <section id="reports" class="content-section">
                <h2>Reports</h2>
                <p>Reports content will be displayed here.</p>
            </section>
            <section id="settings" class="content-section">
                <h2>Settings</h2>
                <p>Settings content will be displayed here.</p>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
